
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidature en ligne - Offre de stage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>Candidature en ligne - Offre de stage</h1>
        <p>Remplissez le formulaire ci-dessous pour envoyer votre demande de stage.</p>
    </header>

    <main class="main-content">
        <form action="#" method="POST" class="application-form" onsubmit="return verifierCandidature(event)"></form>
            
            <!-- Fieldset 1-->
            <fieldset class="les-fieldset">
                <legend class="les-legend">Profil du candidat</legend>
                
                <div class="form-group">
                    <label class="label-données" for="nom">Nom* </label>
                    <input type="text" id="nom" name="nom" required placeholder="Ex. NZO NCHAMA">
                </div>

                <div class="form-group">
                    <label class="label-données" for="nom">Prénom* </label>
                    <input type="text" id="prenom" name="prenom" required placeholder="Ex. Teodoro Micha">
                </div>
                
                <div class="form-group">
                    <label class="label-données" for="email">Email* </label>
                    <input type="email" id="email" name="email" required placeholder="Ex. Teodoromica@gmail.com">
                </div>
                
                <div class="form-group">
                    <label class="label-données" for="telephone">Téléphone </label>
                    <input type="tel" id="telephone" name="telephone" placeholder="Ex. 0622917139">
                </div>
            </fieldset>

            <!-- Fieldset 2 -->
            <fieldset class="les-fieldset">
                <legend class="les-legend">Information sur le stage</legend>
                
                <div class="form-group">
                    <label class="label-données" for="domaine">Département </label>
                    <select id="domaine" name="domaine" required>
                        <option value="">Sélectionnez un domaine</option>
                        <option value="developpement">Développement Web / Informatique</option>
                        <option value="marketing">Marketing Digital / Communication</option>
                        <option value="design">Design Graphique / UI-UX</option>
                        <option value="rh">Ressources Humaines</option>
                    </select>
                </div>
                
                <div class="form-group" role="radiogroup" aria-required="true">
                    <label for="duree">Durée </label>
                    <div class="duree-radio">
                        <label class="label-radio">
                            <input type="radio" name="duree" value="1-mois" required>
                            <span>1 mois</span>
                        </label>
                        <label class="label-radio">
                            <input type="radio" name="duree" value="2-mois" required>
                            <span>2 mois</span>
                        </label>
                        <label class="label-radio">
                            <input type="radio" name="duree" value="3-mois" required>
                            <span>3 mois</span>
                        </label>
                    </div>
                </div>
            </fieldset>

            <!-- Fieldset 3 -->
            <fieldset class="les-fieldset">
                <legend class="les-legend">Validation et envoi</legend>
                
                <div class="form-group">
                    <label for="cv">Curriculum Vitae (CV) :</label>
                    <input type="file" id="cv" name="cv" required accept=".pdf,.doc,.docx">
                </div>
                
                <div class="form-group">
                    <label class="label-données" for="message">Lettre de motivation :</label>
                    <textarea id="message" name="message" rows="5" placeholder="Parlez-nous de vous et de vos motivations..."></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="certif" name="certif">
                    <label for="certif" class="label-inline">Je certifie que toutes les informations fournies sont exactes.</label>
                </div>
            </fieldset>

            
            <div class="form-actions">
                <button type="submit" class="boton-submit">Réinitialiser</button>
                <button type="submit" class="boton-submit">Envoyer la candidature</button>
                
            </div>

        </form>
    </main>

    <footer class="main-footer">
        <p><strong>Teodoro Micha ST</strong></p>
        <p>&copy; 2026 Tous droits réservés.</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
